# Plesk — Additional Nginx Directives
# Paste this in: Plesk → accessfold.unionfold.com → Apache & nginx Settings → Additional nginx directives

# ── CDN Widget (CORS + Long Cache) ──
location /widget/cdn/ {
    alias /home/kost/accessfold.unionfold.com/widget/cdn/;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
    add_header Cache-Control "public, max-age=31536000, immutable";

    types {
        application/javascript js;
        text/css css;
    }

    # Handle CORS preflight
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }
}

# ── Laravel API ──
location /api/ {
    alias /home/kost/accessfold.unionfold.com/backend/public/;
    try_files $uri $uri/ @laravel_api;

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $request_filename;
        include fastcgi_params;
    }
}

location @laravel_api {
    rewrite /api/(.*)$ /api/index.php?/$1 last;
}

# ── Dashboard (Nuxt SSR via PM2) ──
location /dashboard/ {
    proxy_pass http://127.0.0.1:3002/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

# ── SPA Fallback for Marketing Site ──
# (Using a regex to avoid conflict with Plesk's default "location /" block)
location ~ ^/(?!api|widget/cdn|dashboard).*$ {
    root /home/kost/accessfold.unionfold.com/public_html;
    try_files $uri $uri/ /index.html;
}
